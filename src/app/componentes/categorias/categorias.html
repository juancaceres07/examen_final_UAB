<div class="card p-4 shadow-sm">
  <h3 class="mb-4">☕ Gestión de Categorías</h3>

  <div class="input-group mb-4">
    <span class="input-group-text bg-light">🏷️</span>
    <input type="text" 
           class="form-control" 
           [(ngModel)]="nuevaCategoria" 
           placeholder="Ej: Bebidas Frías o Postres"
           (keyup.enter)="agregar()">
    
    <button [class]="idEnEdicion ? 'btn btn-warning' : 'btn btn-primary'" 
            (click)="agregar()"
            type="button">
      {{ idEnEdicion ? '💾 Actualizar' : '+ Agregar Categoría' }}
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th style="width: 10%">ID</th>
          <th style="width: 60%">Nombre</th>
          <th style="width: 30%" class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of listaCategorias">
          <td><span class="badge bg-secondary">{{ cat.id }}</span></td>
          <td class="fw-bold">{{ cat.nombre }}</td>
          <td class="text-center">
            <button class="btn btn-outline-warning btn-sm me-2" (click)="editar(cat)">
              ✏️ Editar
            </button>
            
            <button class="btn btn-outline-danger btn-sm" (click)="borrar(cat.id)">
              🗑️ Borrar
            </button>
          </td>
        </tr>
        <tr *ngIf="listaCategorias.length === 0">
          <td colspan="3" class="text-center text-muted">No hay categorías registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

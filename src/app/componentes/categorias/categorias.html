<div class="card p-4 shadow-sm">
  <h3>☕ Gestión de Categorías</h3>
  <div class="input-group mb-3">
    <input type="text" class="form-control" [(ngModel)]="nuevaCategoria" placeholder="Ej: Bebidas Frías">
    <button class="btn btn-primary" (click)="agregar()">Guardar Categoría</button>
  </div>

  <table class="table table-hover mt-3">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre de Categoría</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of listaCategorias">
        <td>{{ cat.id }}</td>
        <td>{{ cat.nombre }}</td>
        <td>
          <button class="btn btn-danger btn-sm" (click)="borrar(cat.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
